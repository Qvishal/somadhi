version: '3.8'

services:
  web:
    build: .
    container_name: somadi_lifescience_web
    ports:
      - "8080:80"
    volumes:
      # Bind-mount source files for real-time development (optional)
      - .:/var/www/html
      # Persist inquiry submissions on the host system
      - ./storage:/var/www/html/storage
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
